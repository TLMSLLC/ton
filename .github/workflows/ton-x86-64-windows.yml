name: Windows TON build (portable, x86-64)

on: [push,workflow_dispatch,workflow_call]

defaults:
  run:
    shell: cmd

permissions:
  contents: read

jobs:
  build:

    runs-on: windows-2019

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Get Current OS version
        run: |
          systeminfo | findstr /B /C:"OS Name" /C:"OS Version"

      - name: Check out current repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: 'recursive'

      - name: Build TON
        run: |
          git submodule sync --recursive
          git submodule update
          copy assembly\native\build-windows-github-2019.bat .
          copy assembly\native\build-windows-2019.bat .
          build-windows-github-2019.bat Enterprise

      - name: Upload artifacts
        uses: actions/upload-artifact@0c366cb4fc8897159c94880f94b55bc716ad6a66 # master
        with:
          name: ton-x86-64-windows
          path: artifacts
