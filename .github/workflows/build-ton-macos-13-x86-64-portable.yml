name: MacOS-13 TON build (portable, x86-64)

on: [push,workflow_dispatch,workflow_call]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: 'recursive'

      - name: Build TON
        run: |
          git submodule sync --recursive
          git submodule update
          cp assembly/native/build-macos-portable.sh .
          chmod +x build-macos-portable.sh
          ./build-macos-portable.sh -t -a

      - name: Upload artifacts
        uses: actions/upload-artifact@0c366cb4fc8897159c94880f94b55bc716ad6a66 # master
        with:
          name: ton-x86_64-macos
          path: artifacts
