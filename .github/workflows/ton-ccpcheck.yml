name: TON Static Code Analysis

on: [push,workflow_dispatch,workflow_call]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
      with:
        egress-policy: audit

    - name: Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:      
        submodules: 'recursive'

    - name: Run Cppcheck
      uses: Bedzior/run-cppcheck@3b6c6dd9ef5ca90d58c0361cbbd15c85b776d857 # master
      with:
        enabled checks: all
        enable inconclusive: true
        generate report: true

    - name: Upload report
      uses: actions/upload-artifact@0c366cb4fc8897159c94880f94b55bc716ad6a66 # master
      with:
        name: ton-ccpcheck-report
        path: output
